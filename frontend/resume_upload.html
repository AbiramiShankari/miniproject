<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Interview System</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    overflow: hidden;
    color: white;
}

/* Animated Background */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* Main Container */
.container {
    width: 400px;
    margin: 80px auto;
    padding: 30px;
    border-radius: 20px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 30px #00f7ff;
    text-align: center;
}

/* Title Glow */
h1 {
    color: #00f7ff;
    text-shadow: 0 0 10px #00f7ff;
}

/* Upload Box */
.upload-box {
    border: 2px dashed #00f7ff;
    padding: 30px;
    border-radius: 15px;
    margin-top: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.upload-box:hover {
    background: rgba(0, 247, 255, 0.1);
}

/* File Card */
.file-card {
    margin-top: 15px;
    padding: 10px;
    border-radius: 10px;
    background: rgba(0,255,255,0.1);
    display: none;
}

/* Circular Loader */
.loader {
    margin: 20px auto;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 8px solid rgba(255,255,255,0.1);
    border-top: 8px solid #00f7ff;
    animation: spin 1s linear infinite;
    display: none;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* Button */
button {
    margin-top: 20px;
    padding: 10px 25px;
    border-radius: 25px;
    border: none;
    background: #00f7ff;
    color: black;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 15px #00f7ff;
}

button:hover {
    background: #00c3cc;
}

/* AI Status */
.status {
    margin-top: 15px;
    font-size: 14px;
    color: #00f7ff;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">
    <h1>🤖 AI Interview</h1>
    <p>Upload your resume to begin analysis</p>

    <div class="upload-box" id="dropArea">
        Drop Resume Here or Click
        <input type="file" id="fileInput" hidden>
    </div>

    <div class="file-card" id="fileCard"></div>

    <div class="loader" id="loader"></div>

    <div class="status" id="status"></div>

    <button onclick="startAI()">Start AI Analysis</button>
</div>

<script>
// Background animation
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#00f7ff";
    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        p.y += 0.5;
        if (p.y > canvas.height) p.y = 0;
    });
    requestAnimationFrame(animate);
}
animate();

// File handling
const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");
const fileCard = document.getElementById("fileCard");

let selectedFile;

dropArea.onclick = () => fileInput.click();

fileInput.onchange = e => handleFile(e.target.files[0]);

dropArea.ondragover = e => {
    e.preventDefault();
    dropArea.style.background = "rgba(0,255,255,0.2)";
};

dropArea.ondrop = e => {
    e.preventDefault();
    handleFile(e.dataTransfer.files[0]);
};

function handleFile(file) {
    selectedFile = file;
    fileCard.style.display = "block";
    fileCard.innerHTML = `📄 ${file.name}<br>${(file.size/1024).toFixed(1)} KB`;
}

// AI Simulation
function startAI() {
    if (!selectedFile) {
        alert("Upload resume first!");
        return;
    }

    const loader = document.getElementById("loader");
    const status = document.getElementById("status");

    loader.style.display = "block";

    let steps = [
        "Scanning Resume...",
        "Extracting Skills...",
        "Analyzing Experience...",
        "Generating Interview Questions...",
        "Finalizing Report..."
    ];

    let i = 0;
    let interval = setInterval(() => {
        status.innerText = steps[i];
        i++;
        if (i >= steps.length) {
            clearInterval(interval);
            loader.style.display = "none";
            status.innerText = "✅ AI Analysis Complete!";
        }
    }, 1200);
}
</script>

</body>
</html>
