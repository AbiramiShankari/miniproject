<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREPTALK Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: #ffffff;
    padding: 40px;
    width: 350px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #4f46e5;
    margin-bottom: 10px;
}

h2 {
    margin: 10px 0;
}

p {
    color: #6b7280;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
}

input:focus {
    border-color: #6366f1;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(to right, #6366f1, #8b5cf6);
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

.divider {
    margin: 20px 0;
    color: #9ca3af;
}

/* Google Button */
.google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: #ffffff;
    border: 1px solid #d1d5db;
    color: #111;
}

.google-btn img {
    width: 20px;
    height: 20px;
}

/* Message */
.message {
    margin-top: 10px;
    color: green;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
    <div class="logo">🎓 PREPTALK</div>

    <h2>Welcome back</h2>
    <p>Sign in to continue your practice</p>

    <form id="loginForm">
        <input type="email" id="email" placeholder="you@example.com" required>
        <input type="password" id="password" placeholder="Password" required>

        <button type="submit">Sign In</button>
    </form>

    <div class="divider">OR</div>

    <!-- Google Button -->
    <button class="google-btn" onclick="googleLogin()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/IOS_Google_icon.png" alt="Google">
        Continue with Google
    </button>

    <div id="msg" class="message"></div>
</div>

<script>
// Form Validation
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(password.length < 6){
        alert("Password must be at least 6 characters");
        return;
    }

    document.getElementById("msg").innerText = "Login Successful ✅";
});

// Google Button Action
function googleLogin() {
    window.location.href = "https://accounts.google.com/";
}
</script>

</body>
</html>
