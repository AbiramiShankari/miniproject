<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview History</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f9fafb;
    }

    .container {
      padding: 40px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h2 {
      margin: 0;
      font-size: 28px;
    }

    .header p {
      margin: 5px 0 0;
      color: #6b7280;
    }

    .new-btn {
      background: linear-gradient(90deg, #3b82f6, #7c3aed);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      cursor: pointer;
    }

    .card {
      margin-top: 30px;
      background: #f3f4f6;
      border-radius: 15px;
      padding: 60px 20px;
      text-align: center;
    }

    .icon {
      font-size: 40px;
      color: #9ca3af;
    }

    .card h3 {
      margin-top: 20px;
      font-size: 20px;
    }

    .card p {
      color: #6b7280;
    }

    .start-btn {
      margin-top: 20px;
      background: linear-gradient(90deg, #3b82f6, #7c3aed);
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      <div>
        <h2>Interview History</h2>
        <p>0 sessions completed</p>
      </div>
      <button class="new-btn">New Interview →</button>
    </div>

    <div class="card">
      <div class="icon">↺</div>
      <h3>No interviews yet</h3>
      <p>Complete your first mock interview to see results here.</p>
      <button class="start-btn">Start Interview</button>
    </div>

  </div>

</body>
</html>
