<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Communication Training Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f7fb;
    padding:30px;
}

/* HEADER */
h1{
    font-size:28px;
}

.subtitle{
    color:#666;
    margin-bottom:20px;
}

/* TABS */
.tabs{
    display:flex;
    gap:10px;
    background:#eee;
    padding:10px;
    border-radius:10px;
}

.tab{
    padding:8px 15px;
    border-radius:8px;
    cursor:pointer;
}

.active{
    background:white;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* CONTENT */
.content{
    margin-top:30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.left{
    max-width:60%;
}

.left h2{
    margin-bottom:10px;
}

.left p{
    color:#666;
}

/* BUTTON */
.btn{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#4c5cff,#8a5cff);
    color:white;
    cursor:pointer;
}

/* INPUT */
input{
    padding:10px;
    width:250px;
    border-radius:8px;
    border:1px solid #ccc;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>Communication Training Hub</h1>
<p class="subtitle">
Master every aspect of professional communication — introductions, discussions, emails, presentations & more.
</p>

<!-- TABS -->
<div class="tabs">
    <div class="tab active" onclick="changeTab('self')">Self Intro</div>
    <div class="tab" onclick="changeTab('gd')">GD</div>
    <div class="tab" onclick="changeTab('tech')">Tech HR</div>
    <div class="tab" onclick="changeTab('hr')">General HR</div>
    <div class="tab" onclick="changeTab('role')">Role-Specific</div>
    <div class="tab" onclick="changeTab('email')">Email</div>
    <div class="tab" onclick="changeTab('presentation')">Presentation</div>
</div>

<!-- CONTENT -->
<div class="content" id="content">

    <!-- DEFAULT -->
    <div class="left">
        <h2>Self Introduction Practice</h2>
        <p>Practice introducing yourself for different interview scenarios</p>
    </div>

    <button class="btn">Start Practice</button>

</div>

<script>
function changeTab(type){

    let content = document.getElementById("content");

    // Remove active class
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    event.target.classList.add("active");

    if(type === "gd"){
        content.innerHTML = `
        <div class="left">
            <h2>Group Discussion Practice</h2>
            <p>Practice articulating your views on GD topics</p>
            <p><b>Random Topic</b></p>
            <input placeholder="Or enter a specific GD topic...">
        </div>
        <button class="btn">Generate</button>
        `;
    }

    else if(type === "tech"){
        content.innerHTML = `
        <div class="left">
            <h2>Technical HR Interview</h2>
            <p>Practice HR questions with a technical angle — project experience, problem-solving, and decisions</p>
        </div>
        <button class="btn">Start Practice</button>
        `;
    }

    else if(type === "hr"){
        content.innerHTML = `
        <div class="left">
            <h2>General HR Interview</h2>
            <p>Practice behavioral & personality questions — motivation, teamwork, leadership, career goals</p>
        </div>
        <button class="btn">Start Practice</button>
        `;
    }

    else if(type === "role"){
        content.innerHTML = `
        <div class="left">
            <h2>Role-Specific Communication</h2>
            <p>Practice explaining, persuading, and pitching for your target role</p>
        </div>
        <button class="btn">Start</button>
        `;
    }

    else if(type === "email"){
        content.innerHTML = `
        <div class="left">
            <h2>Professional Email Writing</h2>
            <p>Practice writing professional emails for workplace scenarios</p>
        </div>
        <button class="btn">Start Practice</button>
        `;
    }

    else if(type === "presentation"){
        content.innerHTML = `
        <div class="left">
            <h2>Presentation & Public Speaking</h2>
            <p>Structure compelling presentations and practice delivery</p>
        </div>
        <button class="btn">Start Practice</button>
        `;
    }

    else{
        content.innerHTML = `
        <div class="left">
            <h2>Self Introduction Practice</h2>
            <p>Practice introducing yourself for different interview scenarios</p>
        </div>
        <button class="btn">Start Practice</button>
        `;
    }
}
</script>

</body>
</html>
